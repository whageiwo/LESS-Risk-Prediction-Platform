name: Keep Streamlit Awake

on:
  schedule:
    - cron: '0 */5 * * *' # 每 5 小时自动运行
  workflow_dispatch: # 允许手动运行

permissions:
  contents: write

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 👈 关键修改 1：获取完整历史记录，防止拉取时报错

      - name: Make Empty Commit
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git commit --allow-empty -m "Keep-alive ping from GitHub Actions"
          git pull --rebase origin main # 👈 关键修改 2：强制在推之前融合线上所有改动
          git push origin main
