name: Keep Streamlit Awake

on:
  schedule:
    # cron 表达式（一种定时语法），表示每隔 5 小时自动运行一次
    - cron: '0 */5 * * *' 
  workflow_dispatch: # 允许你在网页上点击按钮手动触发

# 显式声明赋予此脚本向你的仓库写入代码的权限
permissions:
  contents: write

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
      
      - name: Make Empty Commit
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git commit --allow-empty -m "Keep-alive ping from GitHub Actions"
          git pull --rebase origin main  # 👈 加上这行：推之前先拉取最新代码，彻底消灭冲突
          git push origin main           # 👈 明确指定推送到 main 分支
